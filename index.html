<div id="hdr">
  <div>
    <div class="logo">iP<b>H</b>ANDA</div>

<div id="tabbar"></div>
<div id="body"><p style="color:#6B85A8;padding:20px">Loading...</p></div>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
var S={
  tab:'fixtures',apiKey:ls('fd_api_key')||'',br:1000,dOff:0,
  comp:null,fixes:[],loading:false,err:null,fix:null,
  mkts:[],busy:false,res:null,
  accu:lj('ip_accu',[]),audit:lj('ip_audit',[])
};
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lj(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function r2(n){return Math.round(n*100)/100;}
function clamp(n,lo,hi){return Math.min(hi,Math.max(lo,n));}

// ════════════════════════════════════════════════════════════
// LEAGUE PRIORS
// ════════════════════════════════════════════════════════════
var LP={
  CL: {goals:2.7,corners:9.8,draws:0.24,btts:0.56,homeEdge:0.44,h1goals:0.44,cardsPer90:3.1,label:'Champions League'},
  PL: {goals:2.8,corners:10.2,draws:0.23,btts:0.55,homeEdge:0.46,h1goals:0.43,cardsPer90:3.3,label:'Premier League'},
  PD: {goals:2.6,corners:9.4,draws:0.26,btts:0.52,homeEdge:0.48,h1goals:0.40,cardsPer90:4.1,label:'La Liga'},
  BL1:{goals:3.1,corners:9.9,draws:0.22,btts:0.60,homeEdge:0.45,h1goals:0.45,cardsPer90:3.2,label:'Bundesliga'},
  SA: {goals:2.6,corners:9.0,draws:0.27,btts:0.51,homeEdge:0.47,h1goals:0.38,cardsPer90:4.4,label:'Serie A'},
  FL1:{goals:2.7,corners:9.5,draws:0.25,btts:0.54,homeEdge:0.46,h1goals:0.41,cardsPer90:3.8,label:'Ligue 1'},
  ELC:{goals:2.6,corners:10.8,draws:0.28,btts:0.53,homeEdge:0.44,h1goals:0.42,cardsPer90:3.0,label:'Championship'},
  DED:{goals:3.2,corners:9.3,draws:0.20,btts:0.62,homeEdge:0.50,h1goals:0.46,cardsPer90:2.9,label:'Eredivisie'},
  PPL:{goals:2.5,corners:9.1,draws:0.28,btts:0.50,homeEdge:0.48,h1goals:0.39,cardsPer90:4.0,label:'Primeira Liga'},
  BSA:{goals:2.4,corners:8.8,draws:0.29,btts:0.48,homeEdge:0.50,h1goals:0.38,cardsPer90:3.9,label:'Brasileirao'}
};
function prior(comp){return LP[comp]||{goals:2.7,corners:9.5,draws:0.25,btts:0.54,homeEdge:0.46,h1goals:0.42,cardsPer90:3.5,label:'Unknown'};}

// ════════════════════════════════════════════════════════════
// GAP ENGINE
// ════════════════════════════════════════════════════════════
function mkG(){return{ha:{},hd:{},aa:{},ad:{}};}
var G={sot:mkG(),soff:mkG(),cor:mkG()};
var LR=0.08,HADV=0.08;
function gr(r,k){return r[k]!==undefined?r[k]:1.0;}
function gPred(r,h,a){
  return[Math.max(0.1,gr(r.ha,h)*gr(r.ad,a)*(1+HADV)),Math.max(0.1,gr(r.aa,a)*gr(r.hd,h))];
}

// ════════════════════════════════════════════════════════════
// LOGISTIC REGRESSION xG MODEL
// p(goal) = 1/(1+exp(-z))
// ════════════════════════════════════════════════════════════
var XC={b0:-1.50,bd:-0.07,ba:0.85,bP:-1.15,bT:0.50,bC:0.70,bBox:0.80};
function xgShot(d,a,p,f){
  f=f||{};
  var z=XC.b0+XC.bd*d+XC.ba*a+XC.bP*(p||0)+XC.bT*(f.tb?1:0)+XC.bC*(f.cb?1:0)+XC.bBox*(d<18?1:0);
  return 1/(1+Math.exp(-z));
}
function teamXg(sot,soff,cor,home){
  var sotQ=xgShot(14,0.45,0.4,{});
  var soffQ=xgShot(22,0.25,0.5,{});
  var corQ=xgShot(10,0.20,0.6,{cb:true})*0.12;
  return r2(Math.max(0.05,(sot*sotQ+soff*soffQ+cor*corQ)*(home?1.05:1.0)));
}
function teamXga(oSot,oSoff,oCor,home){
  var pa=home?0.9:1.1;
  var sotQ=xgShot(14,0.45,0.4*pa,{});
  var soffQ=xgShot(22,0.25,0.5*pa,{});
  var corQ=xgShot(10,0.20,0.6*pa,{cb:true})*0.12;
  return r2(Math.max(0.05,oSot*sotQ+oSoff*soffQ+oCor*corQ));
}

function predict(home,away,lp){
  var hSot=gPred(G.sot,home,away);
  var hSoff=gPred(G.soff,home,away);
  var hCor=gPred(G.cor,home,away);
  var hS=hSot[0],aS=hSot[1],hF=hSoff[0],aF=hSoff[1],hC=hCor[0],aC=hCor[1];

  // Apply league prior correction on corners
  var lpCorAdj=lp?(lp.corners/9.5):1.0;
  hC=r2(hC*lpCorAdj); aC=r2(aC*lpCorAdj);

  var hXg=teamXg(hS,hF,hC,true);
  var aXg=teamXg(aS,aF,aC,false);
  var hXga=teamXga(aS,aF,aC,true);
  var aXga=teamXga(hS,hF,hC,false);

  return{
    hSot:r2(hS),aSot:r2(aS),hSoff:r2(hF),aSoff:r2(aF),
    hC:r2(hC),aC:r2(aC),htHC:r2(hC*0.46),htAC:r2(aC*0.46),
    hXg:hXg,aXg:aXg,hXga:hXga,aXga:aXga,
    hXgd:r2(hXg-hXga),aXgd:r2(aXg-aXga)
  };
}

// ════════════════════════════════════════════════════════════
// POISSON
// ════════════════════════════════════════════════════════════
function poi(k,lam){
  if(lam<=0)return k===0?1:0;
  var f=1;for(var i=1;i<=k;i++)f*=i;
  return Math.exp(-lam)*Math.pow(lam,k)/f;
}
function simulate(hXg,aXg){
  var hw=0,dr=0,aw=0,bt=0,grid=[];
  for(var h=0;h<=8;h++){for(var a=0;a<=8;a++){
    var p=poi(h,hXg)*poi(a,aXg);
    if(h>a)hw+=p;else if(h===a)dr+=p;else aw+=p;
    if(h>0&&a>0)bt+=p;
    grid.push({sc:h+'-'+a,p:r2(p*100),t:h+a});
  }}
  var o15=r2(grid.filter(function(g){return g.t>1;}).reduce(function(s,g){return s+g.p/100;},0));
  var o25=r2(grid.filter(function(g){return g.t>2;}).reduce(function(s,g){return s+g.p/100;},0));
  var o35=r2(grid.filter(function(g){return g.t>3;}).reduce(function(s,g){return s+g.p/100;},0));
  grid.sort(function(a,b){return b.p-a.p;});
  return{hw:r2(hw),dr:r2(dr),aw:r2(aw),bt:r2(bt),o15:o15,o25:o25,o35:o35,top:grid.slice(0,8)};
}
function sig(x,sc){return 1/(1+Math.exp(-x/Math.max(sc||1,0.1)));}

// ════════════════════════════════════════════════════════════
// PANDA SCORE
// Price(25) + Availability(20) + Narrative(15) + Data(25) + Alignment(15)
// ════════════════════════════════════════════════════════════
function pandaScore(st,out,lp){
  // Price score: how far xG aligns with implied odds
  var impliedHome=0.45, impliedAway=0.30; // default
  var priceScore=clamp(50+((st.hXg-st.aXg)*20),20,95);

  // Availability: full squad assumed (no injuries data live)
  var availScore=70;

  // Narrative: game state modifiers
  var narrScore=65;

  // Data: xGD strength
  var dataScore=clamp(50+(st.hXgd*30),10,95);

  // Alignment: model vs league prior
  var lpGoalAdj=lp?lp.goals:2.7;
  var modelTotal=st.hXg+st.aXg;
  var alignScore=clamp(100-Math.abs(modelTotal-lpGoalAdj)*20,20,95);

  var total=r2(priceScore*0.25+availScore*0.20+narrScore*0.15+dataScore*0.25+alignScore*0.15);
  var grade=total>=80?'A':total>=70?'B+':total>=60?'B':'C';
  return{price:r2(priceScore),avail:r2(availScore),narr:r2(narrScore),data:r2(dataScore),align:r2(alignScore),total:total,grade:grade};
}

// ════════════════════════════════════════════════════════════
// MATCH ARCHETYPE
// ════════════════════════════════════════════════════════════
function getArchetype(st,out,lp){
  var tXg=st.hXg+st.aXg;
  var tC=st.hC+st.aC;
  var xgDiff=Math.abs(st.hXgd-st.aXgd);
  var lpGoals=lp?lp.goals:2.7;

  if(tXg<1.6&&tC>10) return{name:'CORNER-HEAVY CAGEY',desc:'Low scoring expected. High corner volume. Fade goals, back corners.',color:'#4ECDC4'};
  if(tXg>3.2) return{name:'TRANSITION CHAOS',desc:'Both teams generating. High BTTS and goals probability. Avoid unders.',color:'#FF9F1C'};
  if(out.dr>0.32) return{name:'TRAP UNDER / DRAW LOCK',desc:'Draw probability elevated. Low-event match likely. Neutral markets preferred.',color:'#6B85A8'};
  if(xgDiff>0.8&&out.hw>0.55) return{name:'CONTROL MATCH',desc:'Clear favourite dominance. Team totals and AH stronger than match result.',color:'#2ECC71'};
  if(tXg<lpGoals-0.4) return{name:'1H FREEZE / 2H RELEASE',desc:'Below league average expected. Watch for late goals. 2H markets valuable.',color:'#F8C537'};
  if(st.hXg>1.5&&st.aXg<0.9) return{name:'FALSE FAVOURITE RISK',desc:'Home dominance in xG but away xGA solid. Trap under on away team.',color:'#FF5D73'};
  return{name:'STANDARD MATCH',desc:'No strong archetype signal. Use full market analysis.',color:'#F0F4FF'};
}

// ════════════════════════════════════════════════════════════
// LIVE TRIGGERS
// ════════════════════════════════════════════════════════════
function getLiveTriggers(st,out,lp){
  var triggers=[];
  var tC=st.hC+st.aC;
  var tS=st.hSot+st.aSot;

  // 2H Over trigger
  if(st.hXg>1.2&&st.aXg>0.8&&out.o25>0.55)
    triggers.push({label:'2H OVER TRIGGER',desc:'Both teams generating xG. 2H goals market active if scoreline stays low at HT.',color:'#F8C537'});

  // Corner trigger
  if(tC>10.5)
    triggers.push({label:'CORNER TRIGGER',desc:'High wing use and crossing volume projected. Corner markets active — especially HT over.',color:'#4ECDC4'});

  // BTTS trigger
  if(out.bt>0.58&&tS>9)
    triggers.push({label:'BTTS TRIGGER',desc:'Both teams generating shot quality, not just possession. BTTS Yes confirmed.',color:'#2ECC71'});

  // Under trigger
  if(tS<7&&tC<9&&out.o25<0.42)
    triggers.push({label:'UNDER TRIGGER',desc:'Low SOT, low box entries projected. Under 2.5 Goals is the cleaner read.',color:'#6B85A8'});

  if(!triggers.length)
    triggers.push({label:'NO LIVE TRIGGER',desc:'Standard match profile. No specific live condition detected.',color:'#3A5070'});

  return triggers;
}

// ════════════════════════════════════════════════════════════
// CORRELATION CHECKER
// ════════════════════════════════════════════════════════════
function corrCheck(legs){
  if(legs.length<2)return{grade:'GREEN',msg:'Single leg. No correlation risk.',color:'#2ECC71'};
  var fams=legs.map(function(l){return l.mkt;});
  var uniq=[...new Set(fams)];
  var goalFam=fams.filter(function(f){return f==='GOALS'||f==='BTTS'||f==='RESULT';}).length;
  var allSame=uniq.length===1;

  if(allSame&&legs.length>2)
    return{grade:'RED',msg:'All legs from same market family. Disguised exact-score trap. Reduce to 1-2 legs.',color:'#FF5D73'};
  if(goalFam>=3)
    return{grade:'RED',msg:'3+ goal-correlated legs detected. BTTS + O2.5 + Result = one path. Restructure.',color:'#FF5D73'};
  if(goalFam===2)
    return{grade:'AMBER',msg:'2 correlated legs present. Acceptable if odds justify. Check path dependency.',color:'#FF9F1C'};

  return{grade:'GREEN',msg:'Legs appear structurally independent. Builder is sound.',color:'#2ECC71'};
}

// ════════════════════════════════════════════════════════════
// MARKET BUILDER — Full family separation
// ════════════════════════════════════════════════════════════
function buildMkts(st,out,hn,an,lp){
  var tC=st.hC+st.aC,htC=st.htHC+st.htAC,tS=st.hSot+st.aSot;
  var lpBtts=lp?lp.btts:0.54, lpDraws=lp?lp.draws:0.25;

  // League-prior adjusted probabilities
  var adjBtts=r2((out.bt+lpBtts)/2);
  var adjDraw=r2((out.dr+lpDraws)/2);
  var adjO25=out.o25, adjO35=out.o35;

  var cands=[
    // RESULT
    {mkt:'RESULT',  sel:hn+' Win',              p:out.hw},
    {mkt:'RESULT',  sel:'Draw',                  p:adjDraw},
    {mkt:'RESULT',  sel:an+' Win',               p:out.aw},
    // GOALS
    {mkt:'GOALS',   sel:'Over 2.5 Goals',        p:adjO25},
    {mkt:'GOALS',   sel:'Over 3.5 Goals',        p:adjO35},
    {mkt:'GOALS',   sel:'Under 2.5 Goals',       p:r2(1-adjO25)},
    // BTTS
    {mkt:'BTTS',    sel:'BTTS Yes',              p:adjBtts},
    {mkt:'BTTS',    sel:'BTTS No',               p:r2(1-adjBtts)},
    // CORNERS
    {mkt:'CORNERS', sel:'Over 9.5 Corners',      p:sig(tC-9.5,0.9)},
    {mkt:'CORNERS', sel:'Over 10.5 Corners',     p:sig(tC-10.5,0.95)},
    {mkt:'CORNERS', sel:'Over 11.5 Corners',     p:sig(tC-11.5,1.0)},
    {mkt:'CORNERS HT',sel:'Over 4.5 HT Corners',p:sig(htC-4.5,0.7)},
    {mkt:'CORNERS HT',sel:hn+' 4+ Corners HT',  p:sig(st.htHC-4.0,0.65)},
    // SHOTS
    {mkt:'SHOTS',   sel:'Over 8.5 SOT',          p:sig(tS-8.5,0.8)},
    {mkt:'SHOTS',   sel:'Over 6.5 SOT',          p:sig(tS-6.5,0.7)},
    // BOOKINGS
    {mkt:'BOOKINGS',sel:'Over 3.5 Cards',        p:lp?clamp(0.38+(lp.cardsPer90-3.5)*0.05,0.30,0.65):0.52},
    {mkt:'BOOKINGS',sel:'Over 4.5 Cards',        p:lp?clamp(0.28+(lp.cardsPer90-3.5)*0.05,0.20,0.55):0.38},
    // TEAM TOTALS (neutral market family)
    {mkt:'TEAM TOTAL',sel:hn+' Over 0.5 Goals', p:r2(1-poi(0,st.hXg))},
    {mkt:'TEAM TOTAL',sel:hn+' Over 1.5 Goals', p:r2(1-poi(0,st.hXg)-poi(1,st.hXg))},
    {mkt:'TEAM TOTAL',sel:an+' Over 0.5 Goals', p:r2(1-poi(0,st.aXg))},
    // NEUTRAL MARKETS
    {mkt:'NEUTRAL', sel:'1st Half Draw',         p:r2(lp?lp.h1goals*0.6:0.30)},
    {mkt:'NEUTRAL', sel:'Goal Range 1-2',        p:r2(out.o15-out.o35)},
    {mkt:'NEUTRAL', sel:'Goal Range 2-3',        p:r2(out.o25-out.o35+adjO35*0.4)},
    // xG MARKETS
    {mkt:'xGD',     sel:hn+' xG Advantage',     p:sig(st.hXgd,0.5)},
    {mkt:'xGD',     sel:'xG Total Over '+(r2(st.hXg+st.aXg-0.2)), p:sig(st.hXg+st.aXg-2.2,0.4)}
  ];

  return cands.map(function(c,i){
    var p=r2(Math.max(0.05,Math.min(0.95,c.p)));
    var edge=r2((p-0.5)*100);
    var kelly=r2(Math.max(0,(p-0.5)*10));
    var fair=r2(1/Math.max(p,0.01));
    var v=edge>=8?'Strong Play':edge>=4?'Playable':edge>=0?'Risky':'Avoid';
    return{id:i,mkt:c.mkt,sel:c.sel,p:p,edge:edge,kelly:kelly,fair:fair,verdict:v};
  }).sort(function(a,b){return b.edge-a.edge;});
}
