const HOME_ADV=0.08, HALF_LIFE=50, LR=0.08, BURN_IN=5;
function timeWeight(d){return Math.pow(0.5,d/HALF_LIFE)}
function makeRatings(){const d=()=>new Proxy({},{get:(t,k)=>k in t?t[k]:1.0});return{ha:d(),hd:d(),aa:d(),ad:d()}}

class GAPEngine{
  constructor(){this.sot=makeRatings();this.soff=makeRatings();this.corners=makeRatings()}
  _update(r,home,away,hA,aA,w){const lr=LR*w,hE=r.ha[home]*r.ad[away],aE=r.aa[away]*r.hd[home],hErr=hA-hE,aErr=aA-aE;r.ha[home]=Math.max(0.1,r.ha[home]+lr*hErr*r.ad[away]);r.ad[away]=Math.max(0.1,r.ad[away]-lr*hErr*r.ha[home]);r.aa[away]=Math.max(0.1,r.aa[away]+lr*aErr*r.hd[home]);r.hd[home]=Math.max(0.1,r.hd[home]-lr*aErr*r.aa[away])}
  _pred(r,home,away){return[Math.max(0.1,r.ha[home]*r.ad[away]*(1+HOME_ADV)),Math.max(0.1,r.aa[away]*r.hd[home])]}
  predict(home,away,ctx={}){
    const [hSot,aSot]=this._pred(this.sot,home,away);
    const [hSoff,aSoff]=this._pred(this.soff,home,away);
    const [hC,aC]=this._pred(this.corners,home,away);
    const windAdj=ctx.windKph?Math.max(0.85,1-(ctx.windKph-20)*0.004):1;
    const pressBoost=ctx.homePress?1+(ctx.homePress-50)*0.003:1;
    const motivMult=ctx.homeMotive>7?1.06:ctx.homeMotive<4?0.94:1;
    const interceptPenalty=ctx.homeIntercepts?Math.max(0.85,1-ctx.homeIntercepts*0.005):1;
    const adjHSot=hSot*pressBoost*motivMult,adjASot=aSot*interceptPenalty;
    const adjHC=hC*windAdj,adjAC=aC*windAdj;
    const hXg=adjHSot*0.22+hSoff*0.08+adjHC*0.015;
    const aXg=adjASot*0.22+aSoff*0.08+adjAC*0.015;
    return{hSot:r2(adjHSot),aSot:r2(adjASot),hSoff:r2(hSoff),aSoff:r2(aSoff),hC:r2(adjHC),aC:r2(adjAC),htHC:r2(adjHC*0.46),htAC:r2(adjAC*0.46),hXg:r2(Math.max(0.1,hXg)),aXg:r2(Math.max(0.1,aXg))}
  }
}

function r2(n){return Math.round(n*100)/100}
function poisson(k,lam){if(lam<=0)return k===0?1:0;let f=1;for(let i=1;i<=k;i++)f*=i;return Math.exp(-lam)*Math.pow(lam,k)/f}

function simulateOutcomes(hXg,aXg){
  const MAX=8;let hw=0,draw=0,aw=0,btts=0;const grid=[];
  for(let h=0;h<=MAX;h++){for(let a=0;a<=MAX;a++){const p=poisson(h,hXg)*poisson(a,aXg);if(h>a)hw+=p;else if(h===a)draw+=p;else aw+=p;if(h>0&&a>0)btts+=p;grid.push({score:`${h}-${a}`,p:r2(p*100),h,a})}}
  const total=g=>g.h+g.a;
  return{hw:r2(hw),draw:r2(draw),aw:r2(aw),btts:r2(btts),o15:r2(grid.filter(g=>total(g)>1).reduce((s,g)=>s+g.p/100,0)),o25:r2(grid.filter(g=>total(g)>2).reduce((s,g)=>s+g.p/100,0)),o35:r2(grid.filter(g=>total(g)>3).reduce((s,g)=>s+g.p/100,0)),topScores:grid.sort((a,b)=>b.p-a.p).slice(0,8)}
}

function calcEV(modelProb,bookOdds){if(!bookOdds||bookOdds<=1)return null;const bookProb=1/bookOdds,edge=(modelProb-bookProb)/bookProb*100,kelly=Math.max(0,Math.min(5,((modelProb*bookOdds-1)/(bookOdds-1))/2*100));return{edge:r2(edge),kelly:r2(kelly),fairOdds:r2(1/Math.max(modelProb,0.01))}}
function sigmoid(x,scale=1){return 1/(1+Math.exp(-x/Math.max(scale,0.1)))}

function buildMarkets(stats,outcomes,homeName,awayName,odds={}){
  const totalC=stats.hC+stats.aC,htTotalC=stats.htHC+stats.htAC,totalSot=stats.hSot+stats.aSot;
  const candidates=[
    {market:"CORNERS",sel:`Over 9.5 Corners`,prob:sigmoid(totalC-9.5,0.9),bookOdds:odds.c95},
    {market:"CORNERS",sel:`Over 10.5 Corners`,prob:sigmoid(totalC-10.5,0.95),bookOdds:odds.c105},
    {market:"CORNERS",sel:`Over 11.5 Corners`,prob:sigmoid(totalC-11.5,1.0),bookOdds:odds.c115},
    {market:"CORNERS HT",sel:`Over 4.5 Corners HT`,prob:sigmoid(htTotalC-4.5,0.7),bookOdds:odds.cht45},
    {market:"CORNERS HT",sel:`${homeName} 4+ Corners HT`,prob:sigmoid(stats.htHC-4.0,0.65),bookOdds:null},
    {market:"GOALS",sel:`Over 2.5 Goals`,prob:outcomes.o25,bookOdds:odds.o25},
    {market:"GOALS",sel:`Over 3.5 Goals`,prob:outcomes.o35,bookOdds:odds.o35},
    {market:"BTTS",sel:`BTTS Yes`,prob:outcomes.btts,bookOdds:odds.btts},
    {market:"RESULT",sel:`${homeName} Win`,prob:outcomes.hw,bookOdds:odds.home},
    {market:"RESULT",sel:`Draw`,prob:outcomes.draw,bookOdds:odds.draw},
    {market:"RESULT",sel:`${awayName} Win`,prob:outcomes.aw,bookOdds:odds.away},
    {market:"SHOTS",sel:`Over 8.5 Shots on Target`,prob:sigmoid(totalSot-8.5,0.8),bookOdds:null},
    {market:"BOOKINGS",sel:`Over 3.5 Cards`,prob:0.52,bookOdds:null},
    {market:"BOOKINGS",sel:`Over 4.5 Cards`,prob:0.38,bookOdds:null},
  ];
  return candidates.map((c,i)=>{
    const ev=calcEV(c.prob,c.bookOdds);
    const edge=ev?ev.edge:r2((c.prob-0.5)*100);
    const kelly=ev?ev.kelly:r2(Math.max(0,(c.prob-0.5)*10));
    const fairOdds=r2(1/Math.max(c.prob,0.01));
    const verdict=edge>=8?"Strong Play":edge>=4?"Playable":edge>=0?"Risky":"Avoid";
    return{id:i,...c,edge,kelly,fairOdds,verdict,prob:r2(c.prob)};
  }).sort((a,b)=>b.edge-a.edge);
}

function AccumulatorSlip({legs,bankroll,onRemove,onClear}){
  const combinedOdds=legs.reduce((acc,l)=>acc*l.fairOdds,1);
  const avgKelly=legs.length?legs.reduce((s,l)=>s+l.kelly,0)/legs.length:0;
  const suggestedStake=r2((avgKelly/100)*bankroll);
  return <div style={{background:C.card,border:`1px solid ${C.borderBright}`,borderRadius:8,padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <span style={{fontSize:18,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>ACCUMULATOR SLIP</span>
      {legs.length>0&&<button onClick={onClear} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${C.danger}`,color:C.danger,borderRadius:3,fontSize:11,fontWeight:700}}>CLEAR</button>}
